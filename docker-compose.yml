#
# docker-compose.yml — OpenClaw Gateway on Easypanel
#
# Builds a thin image (Dockerfile) on top of ghcr.io/openclaw/openclaw that
# bakes in a baseline of tools, and runs it as root for full install freedom.
# On every start, a small inline script writes openclaw.json from env vars
# so gateway config (trusted proxies, allowed origins, model selection) is
# always in sync with the values you set in Easypanel.
#
services:
  openclaw:
    # Build our custom image (Dockerfile) on top of the upstream OpenClaw
    # image so a baseline of tools is baked in. OPENCLAW_IMAGE picks the base.
    build:
      context: .
      args:
        OPENCLAW_IMAGE: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    restart: unless-stopped
    init: true
    # Run as root so the agent has full freedom to install packages at runtime
    # (apt/pip/npm). NOTE: combined with the internet-exposed gateway, device
    # auth disabled, and host.docker.internal mapped, this is a deliberate,
    # high-trust single-user setup — the token effectively grants root here.
    user: "0:0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
    volumes:
      - openclaw-state:/home/node/.openclaw
      - openclaw-auth:/home/node/.config/openclaw
    # Pass through EVERY variable set in the Easypanel env panel as a runtime
    # env var. Easypanel writes those vars to a .env file next to this compose
    # file; env_file injects the whole file into the container. This is how new
    # keys (e.g. ZAI_API_KEY) reach OpenClaw and the agent without editing this
    # file. The explicit `environment:` block below still takes precedence.
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_DISABLE_BONJOUR: "1"
      # ── Required ──────────────────────────────────────────────────────────
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      # ── Reverse proxy / CORS ──────────────────────────────────────────────
      OPENCLAW_ALLOWED_ORIGINS: ${OPENCLAW_ALLOWED_ORIGINS:-}
      OPENCLAW_TRUSTED_PROXIES: ${OPENCLAW_TRUSTED_PROXIES:-127.0.0.1,10.11.0.0/16,::1}
      # Set to 1 to skip per-browser device pairing — token alone grants access.
      # Convenient for a single-user setup; weaker than the default (no per-device identity).
      OPENCLAW_DISABLE_DEVICE_AUTH: ${OPENCLAW_DISABLE_DEVICE_AUTH:-}
      # ── Custom / private model provider ───────────────────────────────────
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-}
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY:-}
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:-}
      OPENCLAW_PROVIDER: ${OPENCLAW_PROVIDER:-custom}
      # ── Default model selection (redeploy-safe, written to openclaw.json) ──
      # primary: "<provider>/<model>", e.g. zai/glm-5.2 (built-in providers
      # like zai are activated by their *_API_KEY env var alone).
      # fallbacks: comma-separated "<provider>/<model>" list.
      OPENCLAW_MODEL_PRIMARY: ${OPENCLAW_MODEL_PRIMARY:-}
      OPENCLAW_MODEL_FALLBACKS: ${OPENCLAW_MODEL_FALLBACKS:-}
      # ── Cloud provider keys (optional) ────────────────────────────────────
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    # Generates openclaw.json from env vars, then starts the gateway.
    # The config file is rewritten on every restart so env changes take effect.
    command:
      - sh
      - -c
      - |
        node - <<'JS'
        const e = process.env, fs = require('fs');
        fs.mkdirSync('/home/node/.openclaw', { recursive: true });
        const config = {
          gateway: {
            mode: 'local',
            trustedProxies: (e.OPENCLAW_TRUSTED_PROXIES || '127.0.0.1,::1')
              .split(',').map(s => s.trim()),
            controlUi: {
              allowedOrigins: e.OPENCLAW_ALLOWED_ORIGINS
                ? e.OPENCLAW_ALLOWED_ORIGINS.split(',').map(s => s.trim())
                : [],
              dangerouslyAllowHostHeaderOriginFallback: true,
              dangerouslyDisableDeviceAuth: e.OPENCLAW_DISABLE_DEVICE_AUTH === '1'
            }
          }
        };
        const providers = {};
        // Optional self-hosted OpenAI-compatible provider (vLLM, Ollama, …).
        if (e.OPENCLAW_BASE_URL) {
          const p = e.OPENCLAW_PROVIDER || 'custom';
          const m = e.OPENCLAW_MODEL || p;
          providers[p] = {
            baseUrl: e.OPENCLAW_BASE_URL,
            apiKey: e.OPENCLAW_API_KEY || '',
            api: 'openai-completions',
            models: [{ id: m, name: m }]
          };
        }
        // baseUrl override for a BUILT-IN provider, via OPENCLAW_<PROVIDER>_BASE_URL.
        // e.g. OPENCLAW_ZAI_BASE_URL=https://api.z.ai/api/coding/paas/v4 switches
        // the built-in zai provider to the coding-plan endpoint. The key still
        // comes from the provider's own env var (e.g. ZAI_API_KEY). This merges
        // with the built-in provider definition (model catalog, costs) rather
        // than replacing it, so it's NOT a full custom provider.
        for (const [k, v] of Object.entries(e)) {
          const mm = k.match(/^OPENCLAW_([A-Z0-9]+)_BASE_URL$/);
          if (!mm || !v || !v.trim()) continue;
          const id = mm[1].toLowerCase();
          providers[id] = { ...(providers[id] || {}), baseUrl: v.trim() };
          const keyVar = mm[1] + '_API_KEY';
          if (e[keyVar]) providers[id].apiKey = e[keyVar];
        }
        if (Object.keys(providers).length) config.models = { providers };
        // Default model selection — env-driven so it survives redeploys.
        // Falls back to the custom provider's model when only OPENCLAW_BASE_URL
        // is set (preserves prior behaviour).
        const primary = (e.OPENCLAW_MODEL_PRIMARY || '').trim()
          || (e.OPENCLAW_BASE_URL
                ? (e.OPENCLAW_PROVIDER || 'custom') + '/' + (e.OPENCLAW_MODEL || 'custom')
                : '');
        const fallbacks = (e.OPENCLAW_MODEL_FALLBACKS || '')
          .split(',').map(s => s.trim()).filter(Boolean);
        if (primary) {
          const model = { primary };
          if (fallbacks.length) model.fallbacks = fallbacks;
          config.agents = { defaults: { model } };
        }
        // We run the container as root, so Chromium's sandbox can't initialise
        // and the browser fails to launch unless noSandbox is set. This is a
        // protected config path (can't be changed at runtime via config.patch),
        // so it must be written here in the config file the gateway loads.
        config.browser = { noSandbox: true };
        // OpenClaw guards against accidental config clobbering: a config without
        // meta is treated as suspect and auto-restored from the .last-good
        // backup — which would silently ignore our env-driven config. Stamping
        // meta.lastTouchedAt marks this as an intentional write so it sticks.
        config.meta = { lastTouchedAt: new Date().toISOString() };
        fs.writeFileSync('/home/node/.openclaw/openclaw.json', JSON.stringify(config, null, 2));
        console.log('openclaw.json written');
        JS
        exec node dist/index.js gateway --bind lan --port 18789
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  openclaw-state:
  openclaw-auth:
